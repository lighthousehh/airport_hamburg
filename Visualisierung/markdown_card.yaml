type: markdown
title: "✈️ Hamburg Airport – Zeitfenster"
content: >-
  {% set s = 'sensor.hamburg_airport_landungen_zeitfenster' %}
  {% set wp = state_attr(s, 'window_past') | int(0) %}
  {% set wf = state_attr(s, 'window_future') | int(0) %}
  {% set header = '| | Flug | Herkunft | Plan | Erwartet | Terminal |\n|---|---|---|---|---|---|\n' %}
  {% set ns = namespace(rows='') %}
  {% for i in range(wp, 0, -1) %}
    {% set icon = '⬆️' %}
    {% set row = '| ' + icon + ' | ' + (state_attr(s, 'past_' ~ i ~ '_number') or '—') + ' | ' + (state_attr(s, 'past_' ~ i ~ '_origin') or '—') + ' | ' + (state_attr(s, 'past_' ~ i ~ '_planned') or '—') + ' | ' + (state_attr(s, 'past_' ~ i ~ '_expected') or '—') + ' | ' + (state_attr(s, 'past_' ~ i ~ '_terminal') or '—') + ' |\n' %}
    {% set ns.rows = ns.rows + row %}
  {% endfor %}
  {% for i in range(1, wf + 1) %}
    {% set icon = '🟢' if i == 1 else '⬇️' %}
    {% set row = '| ' + icon + ' | ' + (state_attr(s, 'future_' ~ i ~ '_number') or '—') + ' | ' + (state_attr(s, 'future_' ~ i ~ '_origin') or '—') + ' | ' + (state_attr(s, 'future_' ~ i ~ '_planned') or '—') + ' | ' + (state_attr(s, 'future_' ~ i ~ '_expected') or '—') + ' | ' + (state_attr(s, 'future_' ~ i ~ '_terminal') or '—') + ' |\n' %}
    {% set ns.rows = ns.rows + row %}
  {% endfor %}
  {{ header + ns.rows }}
